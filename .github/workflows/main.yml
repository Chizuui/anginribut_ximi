name: Kernel Build

on:
  workflow_dispatch:
    inputs:
      repository:
        description: 'Kernel Repository'
        required: true
        default: 'Kitauji-High-School/android_kernel_xiaomi_earth'
      branch:
        description: 'Branch'
        required: true
        default: '16.2'
      defconfig:
        description: 'Defconfig name'
        required: true
        default: 'earth_defconfig'
      zipname:
        description: 'Zip name suffix'
        required: false
        default: 'kernel'
      clang:
        description: 'Clang URL'
        required: false
        default: 'https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r536225.tar.gz'
      kernelsu_branch:
        description: 'KernelSU branch'
        required: false
        default: 'main'
      enable_susfs:
        description: 'Enable SUSFS'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        repository: ${{ github.event.inputs.repository }}
        ref: ${{ github.event.inputs.branch }}
        submodules: recursive

    - name: Setup Environment
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev bc zip gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi python3 python-is-python3 git wget curl patch
        export TZ="Asia/Jakarta"
        echo "BUILD_TIME=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV

    - name: Download Clang
      run: |
        mkdir -p clang
        wget -q -O- "${{ github.event.inputs.clang }}" | tar -xz -C clang --strip-components=1 || curl -L "${{ github.event.inputs.clang }}" | tar -xz -C clang --strip-components=1
        export PATH=$PWD/clang/bin:$PATH

    - name: Setup KernelSU
      run: |
        bash -c "$(curl -LSs https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh)" -- "${{ github.event.inputs.kernelsu_branch }}" 2>&1 | head -20 || git clone --depth=1 -b "${{ github.event.inputs.kernelsu_branch }}" https://github.com/tiann/KernelSU.git KernelSU || git clone --depth=1 https://github.com/ReSukiSU/ReSukiSU.git KernelSU

    - name: Add Manual Hooks
      run: |
        if [ -f "fs/Makefile" ] && ! grep -q "CONFIG_KSU_MANUAL_HOOK" fs/Makefile; then
          echo "" >> fs/Makefile
          echo "ifdef CONFIG_KSU_MANUAL_HOOK" >> fs/Makefile
          echo "obj-y += ksu/" >> fs/Makefile
          echo "endif" >> fs/Makefile
        fi
        if [ -f "init/main.c" ] && ! grep -q "ksu_init" init/main.c; then
          echo "" >> init/main.c
          echo "#ifdef CONFIG_KSU_MANUAL_HOOK" >> init/main.c
          echo "extern void ksu_init(void);" >> init/main.c
          echo "#endif" >> init/main.c
        fi

    - name: Patch SUSFS
      if: github.event.inputs.enable_susfs == 'true'
      run: |
        wget -q -O susfs.patch https://github.com/ReSukiSU/ReSukiSU/raw/main/kernel/patches/susfs.patch || exit 0
        patch -p1 < susfs.patch > susfs.log 2>&1 || patch -p0 < susfs.patch >> susfs.log 2>&1 || git apply --reject susfs.patch >> susfs.log 2>&1 || true
        find . -name "*.rej" -delete 2>/dev/null || true

    - name: Prepare Defconfig
      run: |
        export ARCH=arm64
        export KBUILD_BUILD_USER="kumiko"
        export KBUILD_BUILD_HOST="kitauji_quartet"
        ARGS="O=out ARCH=arm64 CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm STRIP=llvm-strip OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LLVM=1 LLVM_IAS=1 CONFIG_DEBUG_SECTION_MISMATCH=y"
        make $ARGS ${{ github.event.inputs.defconfig }} 2>&1 | tee defconfig.log
        echo "CONFIG_KSU=y" >> out/.config
        echo "CONFIG_KSU_MANUAL_HOOK=y" >> out/.config
        if [ "${{ github.event.inputs.enable_susfs }}" = "true" ]; then
          echo "CONFIG_KSU_SUSFS=y" >> out/.config
        fi
        make $ARGS oldconfig >/dev/null 2>&1 || true

    - name: Compile Kernel
      run: |
        export ARCH=arm64
        export KBUILD_BUILD_USER="kumiko"
        export KBUILD_BUILD_HOST="kitauji_quartet"
        ARGS="O=out ARCH=arm64 CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm STRIP=llvm-strip OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LLVM=1 LLVM_IAS=1 CONFIG_DEBUG_SECTION_MISMATCH=y"
        make -j$(nproc) $ARGS 2>&1 | tee compile.log

    - name: Package AnyKernel3
      run: |
        git clone https://github.com/Chizuui/AnyKernel3.git -b hayase Anykernel3 --depth=1 || git clone https://github.com/osm0sis/AnyKernel3.git -b master Anykernel3 --depth=1
        if [ -f out/arch/arm64/boot/Image.gz ]; then
          cp out/arch/arm64/boot/Image.gz Anykernel3/
          mkdir -p Anykernel3/dtb
          find out/arch/arm64/boot/dts -name "*.dtb" -exec cp {} Anykernel3/dtb/ \; 2>/dev/null || true
          cd Anykernel3
          zip -r9 "../Anykernel3-${{ github.event.inputs.zipname }}-${{ env.BUILD_TIME }}.zip" * -x ".git*" 2>/dev/null || true
          cd ..
        fi

    - name: Upload
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Build-${{ env.BUILD_TIME }}
        path: '*.zip'
        retention-days: 30
