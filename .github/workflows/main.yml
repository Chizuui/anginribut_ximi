name: Kernel Build

on:
  workflow_dispatch:
    inputs:
      repository:
        description: 'Kernel Repository'
        required: true
        default: 'xaveroprjkt/kernel_xiaomi_gale'
      branch:
        description: 'Branch'
        required: true
        default: 'dev/17'
      defconfig:
        description: 'Defconfig name'
        required: true
        default: 'gale_defconfig'
      zipname:
        description: 'Zip name suffix'
        required: false
        default: 'kernel'
      clang:
        description: 'Clang URL'
        required: false
        default: 'https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r536225.tar.gz'
      kernelsu_branch:
        description: 'KernelSU branch'
        required: false
        default: 'main'
      enable_susfs:
        description: 'Enable SUSFS patch'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Kernel
      uses: actions/checkout@v4
      with:
        repository: ${{ github.event.inputs.repository }}
        ref: ${{ github.event.inputs.branch }}
        submodules: recursive

    - name: Setup Environment
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev bc zip gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi python3 python3-full python-is-python3 git wget curl patch
        
        export TZ="Asia/Jakarta"
        echo "BUILD_TIME=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV
        
        # Download Clang
        mkdir -p clang
        echo "📥 Downloading Clang..."
        wget -qO- "${{ github.event.inputs.clang }}" | tar -xz -C clang --strip-components=1 2>/dev/null || {
          echo "⚠️  Clang download failed, trying fallback..."
          curl -L "${{ github.event.inputs.clang }}" | tar -xz -C clang --strip-components=1
        }
        
        echo "✓ Clang ready"

    - name: Setup KernelSU
      run: |
        echo "🔧 Setting up KernelSU (Branch: ${{ github.event.inputs.kernelsu_branch }})"
        
        # Official ReSukiSU setup
        bash -c "$(curl -LSs https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh)" -- "${{ github.event.inputs.kernelsu_branch }}" 2>&1 | head -50 || {
          echo "⚠️  Setup script failed, doing fallback clone..."
          git clone --depth=1 -b "${{ github.event.inputs.kernelsu_branch }}" https://github.com/tiann/KernelSU.git KernelSU 2>/dev/null || \
          git clone --depth=1 https://github.com/ReSukiSU/ReSukiSU.git KernelSU
        }
        
        echo "✓ KernelSU ready"

    - name: Apply Local SUSFS & Manual Hooks Patch
      run: |
        echo "📌 Injecting SUSFS and manual hooks using your repository patch"
        
        if [ ! -d "KernelSU" ]; then
          echo "⚠️  KernelSU dir not found"
          exit 0
        fi

        # Langsung download patch dari raw GitHub repo Chizuui/anginribut_ximi
        echo "📥 Fetching patch from Chizuui/anginribut_ximi..."
        wget -qO manual_hook.patch "https://raw.githubusercontent.com/Chizuui/anginribut_ximi/main/50_add_susfs_in_kernel-4.19.patch" || true

        if [ -s manual_hook.patch ]; then
          echo "🔨 Applying your patch: 50_add_susfs_in_kernel-4.19.patch..."
          
          if patch -p1 --dry-run < manual_hook.patch >/dev/null 2>&1; then
            patch -p1 < manual_hook.patch > local_patch.log 2>&1 || true
            echo "✓ Patch applied cleanly"
          else
            echo "⚠️ Conflicts detected, attempting auto-merge (git apply --reject)..."
            git apply --reject manual_hook.patch 2>&1 | tee local_patch.log || true
            
            if find . -name "*.rej" -type f | grep -q .; then
              echo "↪️  Auto-merging rejected hunks..."
              find . -name "*.rej" -type f | while read rej; do
                base="${rej%.rej}"
                grep "^+" "$rej" | sed 's/^+//' >> "$base" 2>/dev/null || true
              done
              find . -name "*.rej" -delete
              echo "✓ Auto-merged (Warning: may cause syntax errors in C files!)"
            fi
          fi
        else
          echo "❌ Gagal mengunduh patch. Pastikan repo bersifat publik dan link raw dapat diakses."
        fi
        
        # Add to fs/Makefile
        if [ -f "fs/Makefile" ]; then
          if ! grep -q "CONFIG_KSU_MANUAL_HOOK" fs/Makefile; then
            echo "" >> fs/Makefile
            echo "# ReSukiSU Manual Hook" >> fs/Makefile
            echo "ifdef CONFIG_KSU_MANUAL_HOOK" >> fs/Makefile
            echo "obj-y += ksu/" >> fs/Makefile
            echo "endif" >> fs/Makefile
            echo "✓ Added to fs/Makefile"
          fi
        fi
        
        # Add to init/main.c
        if [ -f "init/main.c" ]; then
          if ! grep -q "CONFIG_KSU_MANUAL_HOOK" init/main.c; then
            echo "" >> init/main.c
            echo "#ifdef CONFIG_KSU_MANUAL_HOOK" >> init/main.c
            echo "extern void ksu_init(void);" >> init/main.c
            echo "#endif" >> init/main.c
            echo "✓ Added to init/main.c"
          fi
        fi

    - name: Prepare Defconfig
      run: |
        # Set PATH secara eksplisit di sini agar ld.lld pasti terbaca
        export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
        export ARCH=arm64
        export KBUILD_BUILD_USER="chizui"
        export KBUILD_BUILD_HOST="chizui_host"
        ARGS="O=out ARCH=arm64 CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm STRIP=llvm-strip OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LLVM=1 LLVM_IAS=1 CONFIG_DEBUG_SECTION_MISMATCH=y"
        
        echo "📋 Defconfig: ${{ github.event.inputs.defconfig }}"
        make $ARGS ${{ github.event.inputs.defconfig }} 2>&1 | tee defconfig.log
        
        # Inject KSU + SUSFS configs using echo to avoid YAML indentation errors
        echo "CONFIG_KSU=y" >> out/.config
        echo "CONFIG_KSU_MANUAL_HOOK=y" >> out/.config
        echo "CONFIG_KSU_DEBUG=y" >> out/.config
        
        if [ "${{ github.event.inputs.enable_susfs }}" = "true" ]; then
          echo "CONFIG_KSU_SUSFS=y" >> out/.config
          echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> out/.config
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> out/.config
        fi
        
        # Sync config
        make $ARGS oldconfig >/dev/null 2>&1 || make $ARGS syncconfig >/dev/null 2>&1 || true
        echo "✓ Config ready"

    - name: Compile Kernel
      run: |
        # Set PATH secara eksplisit di sini agar ld.lld pasti terbaca
        export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
        export ARCH=arm64
        export KBUILD_BUILD_USER="kumiko"
        export KBUILD_BUILD_HOST="kitauji_quartet"
        ARGS="O=out ARCH=arm64 CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm STRIP=llvm-strip OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LLVM=1 LLVM_IAS=1 CONFIG_DEBUG_SECTION_MISMATCH=y"
        
        echo "🔨 Compiling ($(nproc) threads)..."
        make -j$(nproc) $ARGS 2>&1 | tee compile.log
        
        if [ -f "out/arch/arm64/boot/Image.gz" ]; then
          SIZE=$(du -h out/arch/arm64/boot/Image.gz | cut -f1)
          echo "✓ Image.gz compiled ($SIZE)"
        else
          echo "❌ Compilation failed!"
          tail -50 compile.log
          exit 1
        fi

    - name: Package with AnyKernel3
      run: |
        echo "📦 Packaging"
        
        git clone https://github.com/Chizuui/AnyKernel3.git -b hayase Anykernel3 --depth=1 2>/dev/null || \
        git clone https://github.com/osm0sis/AnyKernel3.git -b master Anykernel3 --depth=1
        
        if [ -f out/arch/arm64/boot/Image.gz ]; then
          cp out/arch/arm64/boot/Image.gz Anykernel3/
          mkdir -p Anykernel3/dtb
          find out/arch/arm64/boot/dts -name "*.dtb" -exec cp {} Anykernel3/dtb/ \; 2>/dev/null || true
          
          cd Anykernel3
          ZIPNAME="Anykernel3-${{ github.event.inputs.zipname }}-${{ env.BUILD_TIME }}.zip"
          zip -r9 "../$ZIPNAME" * -x '.git*' '.github*' >/dev/null 2>&1
          cd ..
          
          SIZE=$(du -h "$ZIPNAME" | cut -f1)
          echo "✓ Packaged: $ZIPNAME ($SIZE)"
        fi

    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Build-${{ env.BUILD_TIME }}
        path: |
          *.log
          *.zip
        retention-days: 30
